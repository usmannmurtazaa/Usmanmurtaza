    <!-- Loading State (will be replaced by React) -->

      <div
        style="

          top: 0;

            margin-bottom: 20px;
          "
        ></div>
        <p style="color: white; font-size: 1.2rem; font-weight: 500">Loading Portfolio...</p>
        <style>
          @keyframes spin {
            to {
              transform: rotate(360deg);
            }
          }
        </style>
      </div>
    </div>

    <!-- Additional Performance Scripts (non-blocking) -->
    <script>
      // Performance monitoring
      window.addEventListener('load', function () {
        // Remove loading state
        const root = document.getElementById('root');
        if (root) {
          const loadingDiv = root.firstElementChild;
          if (loadingDiv && loadingDiv.style) {
            loadingDiv.style.display = 'none';
          }
        }

        // Performance logging
        if ('performance' in window) {
          setTimeout(function () {
            const perfData = window.performance.timing;
            const pageLoadTime = perfData.loadEventEnd - perfData.navigationStart;
            console.log('Page fully loaded in ' + pageLoadTime + 'ms');
          }, 0);
        }
      });

      // Service Worker registration for PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/service-worker.js').then(
            function (registration) {
              console.log('ServiceWorker registration successful');
            },
            function (err) {
              console.log('ServiceWorker registration failed: ', err);
            }
          );
        });
      }
    </script>
